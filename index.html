<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebGL Dog Project</title>
    <style>
        body {
            margin: 0;
            background-color: #000040; 
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: sans-serif;
        }
        canvas {
            border: none; 
            margin-top: 20px;
        }

        #ui-controls {
            margin-top: -80px;
        }
    </style>
</head>
<body onload="main()">
    <h2>WebGL Dog - Graphics Project</h2>
    
    <div style="display: flex; justify-content: center; align-items: flex-start; gap: 20px; width: 100%; margin-top: 20px;">
        
        <canvas id="glcanvas" width="800" height="600" style="border: 2px solid white;"></canvas>

        <div id="ui-controls" style="background: #e0e0e0; color: #000; padding: 20px; border-radius: 8px; font-family: sans-serif; min-width: 250px;">
            <h3>Camera Controls</h3>
            
            <label for="viewAngle">View Angle (degrees):</label><br>
            <input type="text" id="viewAngle" value="60" style="margin-bottom: 15px;"><br>

            <label for="camOrthoDistance">Camera Distance:</label><br>
            <input type="text" id="camOrthoDistance" value="9" style="margin-bottom: 15px;"><br>

            <button id="redrawBtn" style="padding: 10px 20px; font-weight: bold; cursor: pointer; margin-bottom: 10px; width: 100%;">Redraw Scene</button>
            
            <hr style="margin: 15px 0;">
            <button id="startAnimBtn" style="padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; width: 48%;">Start Orbit</button>
            <button id="stopAnimBtn" style="padding: 10px; background-color: #f44336; color: white; border: none; cursor: pointer; width: 48%;">Stop Orbit</button>

            <fieldset style="margin-bottom: 15px;">
                <legend>Camera Position (x, y, z):</legend>
                <input type="radio" name="camPos" id="LFT" value="LFT"> <label for="LFT">Left-Front-Top</label><br>
                <input type="radio" name="camPos" id="LFB" value="LFB"> <label for="LFB">Left-Front-Bottom</label><br>
                <input type="radio" name="camPos" id="LBT" value="LBT"> <label for="LBT">Left-Back-Top</label><br>
                <input type="radio" name="camPos" id="LBB" value="LBB"> <label for="LBB">Left-Back-Bottom</label><br>
                <input type="radio" name="camPos" id="RFT" value="RFT" checked> <label for="RFT">Right-Front-Top</label><br>
                <input type="radio" name="camPos" id="RFB" value="RFB"> <label for="RFB">Right-Front-Bottom</label><br>
                <input type="radio" name="camPos" id="RBT" value="RBT"> <label for="RBT">Right-Back-Top</label><br>
                <input type="radio" name="camPos" id="RBB" value="RBB"> <label for="RBB">Right-Back-Bottom</label><br>
            </fieldset>

            <hr style="margin: 15px 0;">
            <fieldset style="margin-bottom: 15px;">
                <legend>Κίνηση (Ροδέλα Ποντικιού):</legend>
                <input type="radio" name="wheelAnim" id="animPartTail" value="Tail" checked> <label for="animPartTail">Ουρά</label><br>
                <input type="radio" name="wheelAnim" id="animPartHead" value="Head"> <label for="animPartHead">Κεφάλι</label><br>
                <input type="radio" name="wheelAnim" id="animPartRBLeg" value="RBLeg"> <label for="animPartRBLeg">Σκάψιμο - Δεξί πίσω πόδι</label><br>
                <input type="radio" name="wheelAnim" id="animPartLBLeg" value="LBLeg"> <label for="animPartLBLeg">Σκάψιμο - Αριστερό πίσω πόδι</label><br>
                <hr style="margin: 10px 0;">
                <input type="radio" name="wheelAnim" id="animPlayDead" value="PlayDead"> <label for="animPlayDead">Play dead</label><br>
                <input type="radio" name="wheelAnim" id="animSouza" value="Souza"> <label for="animSouza">Σούζα</label><br>
                <input type="radio" name="wheelAnim" id="animHound" value="Hound"> <label for="animHound">Λαγωνικό</label><br>
                <input type="radio" name="wheelAnim" id="animReverse" value="Reverse"> <label for="animReverse">Όπισθεν</label><br>
            </fieldset>

            <button id="redrawBtnBottom" style="padding: 10px 20px; font-weight: bold; cursor: pointer;">Redraw Scene</button>
        </div>
    </div>

    <script src="libs/webgl-debug.js"></script>
    <script src="libs/gl-matrix-min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
